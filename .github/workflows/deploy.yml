name: Déploiement Backend

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/medishop-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et push de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Déployer sur l'instance Back via le Front (bastion)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BACK_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.FRONT_HOST }}
          proxy_username: ubuntu
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            IMAGE="${{ env.IMAGE_NAME }}:latest"

            # Sauvegarde l'image actuellement en prod, pour un rollback si besoin
            if docker inspect backend >/dev/null 2>&1; then
              CURRENT_IMAGE=$(docker inspect --format='{{.Config.Image}}' backend)
              docker tag "$CURRENT_IMAGE" medishop-backend:previous || true
            fi

            docker pull "$IMAGE"
            docker rm -f backend || true

            docker run -d \
              --name backend \
              --restart unless-stopped \
              -e PORT=3000 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
              -p 3000:3000 \
              "$IMAGE"

            sleep 5

            # Vérifie que le conteneur tourne toujours après 5s ; sinon rollback
            if [ -z "$(docker ps -q -f name=backend -f status=running)" ]; then
              echo "Le déploiement a échoué, rollback vers l'image précédente..."
              docker rm -f backend || true
              docker run -d \
                --name backend \
                --restart unless-stopped \
                -e PORT=3000 \
                -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
                -e FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
                -p 3000:3000 \
                medishop-backend:previous
              exit 1
            fi

            echo "Déploiement du backend réussi."